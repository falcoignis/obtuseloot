# ObtuseLoot runtime tuning
# These values are intentionally conservative for lower-lag servers.

combat:
  # Damage at/above this value records precision, otherwise brutality.
  precision-threshold-damage: 10.0

evolution:
  # Minimum score before an archetype can be assigned from behavior vectors.
  archetype-score: 20

  # Required lead over second-place archetype score before a definitive archetype is locked.
  # Lower values switch archetypes faster; higher values create more stable identities.
  archetype-dominance-delta: 8

  # Reputation score thresholds for progression states.
  tempered-score: 40
  mythic-score: 120
  hybrid-score: 250

fusion:
  # Fusion can only occur after this total reputation score is reached.
  min-score: 320

  # Draft recipe table for archetype-driven fusions.
  recipes:
    stormglass-reaver:
      archetype: deadeye
      min-precision: 150
      min-brutality: 40
      min-survival: 60
      min-mobility: 120
      min-chaos: 20
      min-consistency: 110
      min-boss-kills: 2

    aegis-paragon:
      archetype: vanguard
      min-precision: 60
      min-brutality: 50
      min-survival: 160
      min-mobility: 40
      min-chaos: 10
      min-consistency: 140
      min-boss-kills: 2

    cataclyst-tyrant:
      archetype: ravager
      min-precision: 20
      min-brutality: 160
      min-survival: 70
      min-mobility: 80
      min-chaos: 150
      min-consistency: 50
      min-boss-kills: 3

    horizon-keeper:
      archetype: warden
      min-precision: 120
      min-brutality: 30
      min-survival: 140
      min-mobility: 70
      min-chaos: 20
      min-consistency: 120
      min-boss-kills: 2

drift:
  # Final chance formula:
  # base-chance + chaos*chaos-multiplier - consistency*consistency-reduction
  # The result is then clamped to [0, max-chance].
  base-chance: 0.03
  chaos-multiplier: 0.01
  consistency-reduction: 0.005
  max-chance: 0.60

lore:
  # Prevents action bar spam and reduces per-tick overhead in combat-heavy scenarios.
  min-update-interval-ms: 500

naming:
  # Chance (0-100) to generate "<prefix> <suffix>" instead of a generic full-name entry.
  prefix-suffix-chance-percent: 60

  # If true, a player UUID always maps to the same generated name roll pattern.
  # Set false to allow fully random naming each generation event.
  use-deterministic-owner-seed: true

awakening:
  executioners-oath:
    min-score: 500
    min-boss-kills: 1
  stormblade:
    min-precision: 120
    min-mobility: 80
  last-survivor:
    min-survival: 120
    min-consistency: 100
