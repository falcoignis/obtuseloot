storage:
  backend: yaml
  fallbackToYamlOnFailure: false

sqlite:
  file: plugins/ObtuseLoot/data/obtuseloot.db

mysql:
  host: localhost
  port: 3306
  database: obtuseloot
  username: root
  password: change-me
  useSsl: false
  connectionPool:
    enabled: false
    maxPoolSize: 10

reputation:
  combat-window-ms: 10000
  low-health-threshold: 6.0
  mobility-distance-threshold: 12.0
  kill-chain-window-ms: 8000
  multi-target-chaos-threshold: 3
  boss-types: [ENDER_DRAGON, WITHER, WARDEN]
  volatile-decay-interval-seconds: 300
  volatile-decay-factor: 0.96
  context-cleanup-seconds: 120

evolution:
  archetype-threshold: 10
  tempered-threshold: 25
  mythic-threshold: 45
  hybrid-threshold: 70
  archetype-switch-margin: 4.0
  current-archetype-inertia: 2.0

drift:
  base-chance: 0.05
  max-chance: 0.40
  chaos-multiplier: 0.01
  consistency-reduction: 0.005
  instability-duration-seconds: 600

persistence:
  autosave-interval-seconds: 300

naming:
  use-deterministic-owner-seed: true
  true-name-probability:
    base: 0
    tempered: 20
    mythic: 65
    awakened: 90
    fused: 100
  discovery-thresholds:
    known: 3
    revealed: 8
    storied: 14
  compression:
    max-words: 6
  lexeme-pools:
    defensive: [ward, bastion, vigil]
    chaotic: [ruin, hollow, mire]
    precision: [oath, glass, warden]
    aggression: [hunger, thorn, harrow]
    memory: [echo, reliquary, vesper]
    mobility: [storm, dusk, choir]
    ritual: [pyre, cairn, vesper]
    support: [mercy, bloom, ward]
    control: [warden, vigil, glass]

combat:
  precision-threshold-damage: 10.0

dashboard:
  webServerEnabled: false
  port: 8085


runtime:
  triggerSubscriptionIndexing: true
