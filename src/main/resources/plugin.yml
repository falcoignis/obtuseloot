name:        ObtuseLoot
version:     0.9.50-beta
main:        obtuseloot.ObtuseLoot
description: Persistent artifact progression with evolution, awakening, and drift.
authors:     [ falcoignis ]
website:     ""
api-version: "1.21"

commands:
  obtuseloot:
    description:  ObtuseLoot core command.
    usage:        |
      /<command> help
      /<command> info
      /<command> inspect
      /<command> refresh [player]
      /<command> reset [player]
      /<command> reload
      /<command> debug help
      /<command> debug inspect|rep|evolve|drift|awaken|fuse|lore|reset|save|reload|instability|archetype|path|seed|simulate|ability|memory|persistence|ecosystem|lineage|genome|projection|subscriptions|artifact
      /<command> debug seed show|reroll|set|export|import
      /<command> debug ecosystem [bias|balance]
      /<command> debug projection [cache|stats]
      /<command> debug genome interactions
      /<command> debug simulate hit|move|lowhp|kill|multikill|bosses|chaos|cycle|resetcontext|path
      /<command> dashboard
      /<command> ecosystem [health|dashboard]
      /<command> ecosystem dump
      /<command> ecosystem reset-metrics
      /<command> ecosystem map [lineage|species|collapse]
      /<command> ecosystem map genome <trait>
      /<command> ecosystem map off
      /<command> debug dashboard
      /<command> addname <pool> <value>
      /<command> removename <pool> <value>
      /<command> give <player>
      /<command> convert
      /<command> reroll
      /<command> inspect
      /<command> force-awaken
      /<command> force-converge
      /<command> repair-state
      /<command> debug-profile
      /<command> give-specific <player> <archetype|family>
      /<command> dump-held
    aliases:      [ ol ]
    permission:   obtuseloot.command

permissions:
  obtuseloot.help:
    description: View the /obtuseloot command reference.
    default: true
  obtuseloot.info:
    description: View plugin runtime status, ecosystem health, dashboard summaries, and map visualizations.
    default: true
  obtuseloot.inspect:
    description: Inspect a player's tracked artifact and reputation state.
    default: op
  obtuseloot.admin:
    description: Administrative access — refresh, reset, reload config, and clear ecosystem rolling metrics.
    default: op
  obtuseloot.edit:
    description: Edit name pools in full (addname / removename for all pools). Grants all scoped obtuseloot.edit.* nodes implicitly.
    default: op
  obtuseloot.edit.prefixes:
    description: Edit the artifact prefix name pool only (addname / removename prefixes).
    default: op
  obtuseloot.edit.suffixes:
    description: Edit the artifact suffix name pool only (addname / removename suffixes).
    default: op
  obtuseloot.debug:
    description: Access the full debug surface — artifact inspection, progression simulation, seed control, ecosystem debug, and runtime diagnostics.
    default: op
  obtuseloot.command:
    description: Root permission for expanded artifact command suite.
    default: op
  obtuseloot.command.give:
    description: Generate and deliver a fresh artifact item to a target player.
    default: op
  obtuseloot.command.convert:
    description: Convert held non-artifact equipment into a fresh artifact identity.
    default: op
  obtuseloot.command.reroll:
    description: Reroll held artifact identity while preserving equipment family.
    default: op
  obtuseloot.command.inspect:
    description: Inspect structured held artifact runtime state.
    default: op
  obtuseloot.command.forceawaken:
    description: Force awakening via the real awakening pipeline on held artifact.
    default: op
  obtuseloot.command.forceconverge:
    description: Force convergence via the real convergence pipeline on held artifact.
    default: op
  obtuseloot.command.repairstate:
    description: Rebuild derived held artifact state (lore, naming, projections) without identity mutation.
    default: op
  obtuseloot.command.debugprofile:
    description: Show structured deep held artifact diagnostics.
    default: op
  obtuseloot.command.givespecific:
    description: Generate constrained artifact identity by archetype or family, with no generic fallback.
    default: op
  obtuseloot.command.dumpheld:
    description: Log concise structured snapshot for the held artifact identity.
    default: op
