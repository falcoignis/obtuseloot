name:        ObtuseLoot
version:     0.9.1
main:        obtuseloot.ObtuseLoot
description: Persistent artifact progression with evolution, awakening, and drift.
authors:     [ falcoignis ]
website:     ""
api-version: "1.21"

commands:
  obtuseloot:
    description:  ObtuseLoot administration and debug command root.
    usage:        |
      /<command> help
      /<command> info
      /<command> inspect [player]
      /<command> refresh [player]
      /<command> reset [player]
      /<command> reload
      /<command> debug help
      /<command> debug inspect|rep|evolve|drift|awaken|fuse|lore|save|seed
      /<command> debug seed show|reroll|set|export|import
      /<command> debug simulate help
      /<command> addname <pool> <value>
      /<command> removename <pool> <value>
    aliases:      [ ol ]
    permission:   obtuseloot.help

permissions:
  obtuseloot.*:
    description: Grants all ObtuseLoot permissions.
    default:     op
    children:
      obtuseloot.admin:            true
      obtuseloot.help:             true
      obtuseloot.info:             true
      obtuseloot.inspect:          true
      obtuseloot.edit:             true
      obtuseloot.debug:            true

  obtuseloot.help:
    description: Allows /ol help — list all console + in-game command usage.
    default:     true

  obtuseloot.info:
    description: Allows /ol info — show plugin runtime status.
    default:     true

  obtuseloot.admin:
    description: Allows /ol reload, /ol refresh, and /ol reset — server-side administrative control.
    default:     op

  obtuseloot.inspect:
    description: Allows /ol inspect and findartifacts — view souls a player is wearing and scan their inventory.
    default:     op

  obtuseloot.edit:
    description: Allows add/remove/list on every editable list.
    default:     op
    children:
      obtuseloot.edit.prefixes:   true
      obtuseloot.edit.suffixes:   true
      obtuseloot.edit.generic:    true

  obtuseloot.edit.prefixes:
    description: Allows editing the prefixes list only.
    default:     op

  obtuseloot.edit.suffixes:
    description: Allows editing the suffixes list only.
    default:     op

  obtuseloot.edit.generic:
    description: Allows editing the generic names list only.
    default:     op

  obtuseloot.debug:
    description: Allows /ol debug and /ol debug simulate commands for progression testing.
    default:     op
