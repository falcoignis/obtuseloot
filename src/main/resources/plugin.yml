name:        ObtuseLoot
version:     0.9.50-beta
main:        obtuseloot.ObtuseLoot
description: Persistent artifact progression with evolution, awakening, and drift.
authors:     [ falcoignis ]
website:     ""
api-version: "1.21"

commands:
  obtuseloot:
    description:  ObtuseLoot administration and debug command root.
    usage:        |
      /<command> help
      /<command> info
      /<command> inspect [player]
      /<command> refresh [player]
      /<command> reset [player]
      /<command> reload
      /<command> debug help
      /<command> debug inspect|rep|evolve|drift|awaken|fuse|lore|reset|save|reload|instability|archetype|path|seed|simulate|ability|memory|persistence|ecosystem|lineage|genome|projection|subscriptions|artifact
      /<command> debug seed show|reroll|set|export|import
      /<command> debug ecosystem [bias|balance]
      /<command> debug projection [cache|stats]
      /<command> debug genome interactions
      /<command> debug simulate hit|move|lowhp|kill|multikill|bosses|chaos|cycle|resetcontext|path
      /<command> dashboard
      /<command> ecosystem [health|dashboard]
      /<command> ecosystem dump
      /<command> ecosystem reset-metrics
      /<command> ecosystem map [lineage|species|collapse]
      /<command> ecosystem map genome <trait>
      /<command> ecosystem map off
      /<command> debug dashboard
      /<command> addname <pool> <value>
      /<command> removename <pool> <value>
    aliases:      [ ol ]

permissions:
  obtuseloot.help:
    description: View the /obtuseloot command reference.
    default: true
  obtuseloot.info:
    description: View plugin runtime status, ecosystem health, dashboard summaries, and map visualizations.
    default: true
  obtuseloot.inspect:
    description: Inspect a player's tracked artifact and reputation state.
    default: op
  obtuseloot.admin:
    description: Administrative access — refresh, reset, reload config, and clear ecosystem rolling metrics.
    default: op
  obtuseloot.edit:
    description: Edit name pools in full (addname / removename for all pools). Grants all scoped obtuseloot.edit.* nodes implicitly.
    default: op
  obtuseloot.edit.prefixes:
    description: Edit the artifact prefix name pool only (addname / removename prefixes).
    default: op
  obtuseloot.edit.suffixes:
    description: Edit the artifact suffix name pool only (addname / removename suffixes).
    default: op
  obtuseloot.debug:
    description: Access the full debug surface — artifact inspection, progression simulation, seed control, ecosystem debug, and runtime diagnostics.
    default: op
