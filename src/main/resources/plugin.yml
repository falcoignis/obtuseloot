name:        ObtuseLoot
version:     0.9.19
main:        obtuseloot.ObtuseLoot
description: Persistent artifact progression with evolution, awakening, and drift.
authors:     [ falcoignis ]
website:     ""
api-version: "1.21"

commands:
  obtuseloot:
    description:  ObtuseLoot administration and debug command root.
    usage:        |
      /<command> help
      /<command> info
      /<command> inspect [player]
      /<command> refresh [player]
      /<command> reset [player]
      /<command> reload
      /<command> debug help
      /<command> debug inspect|rep|evolve|drift|awaken|fuse|lore|reset|save|reload|instability|archetype|path|seed|simulate|ability|memory|persistence|ecosystem|lineage|genome|projection
      /<command> debug seed show|reroll|set|export|import
      /<command> debug ecosystem [bias|balance]
      /<command> debug projection [cache|stats]
      /<command> debug genome interactions
      /<command> debug simulate hit|move|lowhp|kill|multikill|bosses|chaos|cycle|resetcontext|path
      /<command> dashboard
      /<command> ecosystem [health|dashboard]
      /<command> ecosystem map [lineage|species|collapse]
      /<command> ecosystem map genome <trait>
      /<command> ecosystem map off
      /<command> debug dashboard
      /<command> addname <pool> <value>
      /<command> removename <pool> <value>
    aliases:      [ ol ]

permissions:
  obtuseloot.help:
    description: Allows /obtuseloot help.
    default: true
  obtuseloot.info:
    description: Allows /obtuseloot info.
    default: true
  obtuseloot.inspect:
    description: Allows /obtuseloot inspect.
    default: op
  obtuseloot.admin:
    description: Allows /obtuseloot refresh, reset, and reload.
    default: op
  obtuseloot.edit:
    description: Allows /obtuseloot addname and /obtuseloot removename.
    default: op
  obtuseloot.debug:
    description: Allows /obtuseloot debug, /obtuseloot debug simulate, and /obtuseloot debug seed commands for progression testing.
    default: op
