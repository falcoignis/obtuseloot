# ─────────────────────────────────────────────────────────────────────────────
# ObtuseLoot — plugin.yml
# Required by Bukkit/Purpur to recognize and load the plugin.
# Do NOT edit this file unless you know what you are doing.
# ─────────────────────────────────────────────────────────────────────────────

name:        ObtuseLoot
version:     1.0.0
main:        obtuseloot.ObtuseLoot
description: Procedural loot generation with soul-bound particle effects.
authors:     [ falcoignis ]
website:     ""

# Minimum Bukkit/Paper/Purpur API version this plugin targets.
api-version: "1.21"

# ─────────────────────────────────────────────────────────────────────────────
# Commands
# ─────────────────────────────────────────────────────────────────────────────

commands:
  obtuseloot:
    description:  ObtuseLoot administration command.
    usage:        |
      /<command> help
      /<command> info
      /<command> inspect [player]
      /<command> refresh [player]
      /<command> reset [player]
      /<command> reload
      /<command> addname <pool> <value>
      /<command> removename <pool> <value>
    aliases:      [ ol ]
    permission:   obtuseloot.help

# ─────────────────────────────────────────────────────────────────────────────
# Permissions
# ─────────────────────────────────────────────────────────────────────────────

permissions:

  # ── Top-level wildcard ──────────────────────────────────────────────────────
  obtuseloot.*:
    description: Grants all ObtuseLoot permissions.
    default:     op
    children:
      obtuseloot.admin:            true
      obtuseloot.help:             true
      obtuseloot.info:             true
      obtuseloot.give:             true
      obtuseloot.givesoul:         true
      obtuseloot.convert:          true
      obtuseloot.inspect:          true
      obtuseloot.clearitem:        true
      obtuseloot.clearinventory:   true
      obtuseloot.edit:             true

  # ── Informational (safe for all players) ───────────────────────────────────
  obtuseloot.help:
    description: Allows /ol help — list all console + in-game command usage.
    default:     true

  obtuseloot.info:
    description: Allows /ol info — show plugin runtime status.
    default:     true

  # ── Administrative ──────────────────────────────────────────────────────────
  obtuseloot.admin:
    description: Allows /ol reload, /ol refresh, and /ol reset — server-side administrative control.
    default:     op

  # ── Item generation ─────────────────────────────────────────────────────────
  obtuseloot.give:
    description: Allows /ol give — generate and give a random artifact.
    default:     op

  obtuseloot.givesoul:
    description: Allows /ol givesoul — give an artifact with a specific soul.
    default:     op

  obtuseloot.convert:
    description: Allows /ol convert — stamp ObtuseLoot metadata onto a held item.
    default:     op

  # ── Inspection ──────────────────────────────────────────────────────────────
  obtuseloot.inspect:
    description: Allows /ol inspect and findartifacts — view souls a player is wearing and scan their inventory.
    default:     op

  # ── Cleanup ─────────────────────────────────────────────────────────────────
  obtuseloot.clearitem:
    description: Allows /ol clearitem — strip all ObtuseLoot data from a single held item.
    default:     op

  obtuseloot.clearinventory:
    description: Allows /ol clearinventory — strip ObtuseLoot data from every item in a player's inventory. More destructive than clearitem; granted separately.
    default:     op

  # ── List editing (blanket) ──────────────────────────────────────────────────
  obtuseloot.edit:
    description: Allows add/remove/list on every editable list.
    default:     op
    children:
      obtuseloot.edit.prefixes:   true
      obtuseloot.edit.suffixes:   true
      obtuseloot.edit.generic:    true

  # ── List editing (granular) ─────────────────────────────────────────────────
  obtuseloot.edit.prefixes:
    description: Allows editing the prefixes list only.
    default:     op

  obtuseloot.edit.suffixes:
    description: Allows editing the suffixes list only.
    default:     op


  obtuseloot.edit.generic:
    description: Allows editing the generic names list only.
    default:     op
