name:        ObtuseLoot
version:     0.9.3
main:        obtuseloot.ObtuseLoot
description: Persistent artifact progression with evolution, awakening, and drift.
authors:     [ falcoignis ]
website:     ""
api-version: "1.21"

commands:
  obtuseloot:
    description:  ObtuseLoot administration and debug command root.
    usage:        |
      /<command> help
      /<command> info
      /<command> inspect [player]
      /<command> refresh [player]
      /<command> reset [player]
      /<command> reload
      /<command> debug help
      /<command> debug inspect|rep|evolve|drift|awaken|fuse|lore|reset|save|reload|instability|archetype|path|seed|simulate
      /<command> debug seed show|reroll|set|export|import
      /<command> debug simulate hit|move|lowhp|kill|multikill|bosses|chaos|cycle|resetcontext|path
      /<command> addname <pool> <value>
      /<command> removename <pool> <value>
    aliases:      [ ol ]
    permission:   obtuseloot.debug

permissions:
  obtuseloot.debug:
    description: Allows /obtuseloot debug, /obtuseloot debug simulate, and /obtuseloot debug seed commands for progression testing.
    default: op
