name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Diagnose Maven repository access
        run: ./scripts/diagnose-maven-access.sh

      - name: Build and test
        env:
          MAVEN_MIRROR_URL: ${{ secrets.MAVEN_MIRROR_URL }}
          MAVEN_PROXY_USER: ${{ secrets.MAVEN_PROXY_USER }}
          MAVEN_PROXY_PASS: ${{ secrets.MAVEN_PROXY_PASS }}
        run: |
          if [ -n "${MAVEN_MIRROR_URL}" ]; then
            ./scripts/mvn-via-mirror.sh test
          else
            mvn -B -ntp test
          fi
