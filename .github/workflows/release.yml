name: Release ObtuseLoot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build release artifact
        run: mvn -B -ntp clean package

      - name: Resolve finalized JAR path
        id: finalized_jar
        shell: bash
        run: |
          set -euo pipefail

          jar_path="$(find target -maxdepth 1 -type f -name '*.jar' \
            ! -name 'original-*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            | sort \
            | head -n 1)"

          if [[ -z "${jar_path}" ]]; then
            echo "No finalized JAR found in target/." >&2
            exit 1
          fi

          echo "finalized_jar=${jar_path}" >> "$GITHUB_OUTPUT"

      - name: Upload release JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: obtuseloot-release-jar
          path: ${{ steps.finalized_jar.outputs.finalized_jar }}
          if-no-files-found: error

      - name: Create GitHub release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          files: |
            ${{ steps.finalized_jar.outputs.finalized_jar }}
            analytics/world-lab/**/*.md
            analytics/dashboard/**/*.md
          fail_on_unmatched_files: false
