name: Dashboard Regeneration

on:
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn -B -ntp clean package -DskipTests

      - name: Regenerate dashboard + visualizations
        run: |
          ./scripts/run-world-lab-validation.sh
          ./scripts/run-meta-analysis.sh

      - name: Ecology summary
        run: |
          test -f analytics/ecology-alerts-report.md && cat analytics/ecology-alerts-report.md || true

      - name: Upload ecosystem dashboard
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-dashboard
          path: analytics/dashboard/
          if-no-files-found: ignore

      - name: Upload ecosystem visualizations
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-visualizations
          path: analytics/visualizations/
          if-no-files-found: ignore
