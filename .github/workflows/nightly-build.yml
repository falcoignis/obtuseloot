name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build plugin
        run: mvn -B -ntp clean package

      - name: Run simulations
        run: |
          ./scripts/run-chaos-tests.sh
          ./scripts/run-population-simulation.sh
          ./scripts/run-world-simulation.sh

      - name: Run meta-analysis and confidence scoring
        run: ./scripts/run-meta-analysis.sh

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: obtuseloot-nightly-reports
          path: |
            analytics/**
            target/ObtuseLoot-*.jar
