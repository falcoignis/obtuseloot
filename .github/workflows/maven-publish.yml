name: maven-publish

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_MIRROR_URL: ${{ secrets.MAVEN_MIRROR_URL }}
          MAVEN_PROXY_USER: ${{ secrets.MAVEN_PROXY_USER }}
          MAVEN_PROXY_PASS: ${{ secrets.MAVEN_PROXY_PASS }}
        run: ./scripts/build.sh deploy -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}

      - name: Upload JAR to release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: target/ObtuseLoot-*.jar
